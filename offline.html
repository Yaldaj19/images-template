<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#05060e" />
  <title>آفلاین — جایگذاری الگو/امضا روی تصویر</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px; text-align: center;
      background: #05060e; color: #e5e7eb;
      font-family: Vazirmatn, system-ui, -apple-system, sans-serif;
    }
    .box { max-width: 340px; }
    .icon {
      width: 64px; height: 64px; margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 16px; background: rgba(6, 212, 255, 0.12);
      color: #06d4ff;
    }
    h1 { font-size: 19px; margin: 0 0 8px; }
    p  { font-size: 14px; line-height: 1.9; color: #9ca3af; margin: 0 0 22px; }
    button {
      font-family: inherit; font-size: 14px; font-weight: 700;
      background: #06d4ff; color: #05060e;
      border: 0; border-radius: 10px; padding: 10px 24px; cursor: pointer;
    }
    button:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon" aria-hidden="true">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
      </svg>
    </div>
    <h1>اتصال اینترنت برقرار نیست</h1>
    <p>برای استفاده از ابزار به اینترنت وصل شو. پس از برقراری اتصال، دوباره تلاش کن.</p>
    <button type="button" onclick="location.reload()">تلاش دوباره</button>
  </div>
</body>
</html>
